<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Flashcards – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <div class="page-main">
            <div class="page-container">
                <div class="welcome-card">
                    <h2 class="section-title">📇 Flashcards</h2>
                    <p class="match-hint-text">Tap or click the card to reveal the translation</p>

                    <div id="card-section">
                        <div th:if="${card == null}" class="banner-error">No cards available.</div>
                        <div th:if="${card != null}" th:replace="~{fragments/card :: card}"></div>
                    </div>

                    <div class="flashcard-actions">
                        <button type="button"
                                class="btn-flashcard-again"
                                hx-get="/flashcards/card"
                                hx-target="#card-section"
                                hx-swap="innerHTML">
                            Again
                        </button>
                        <button type="button"
                                class="btn-flashcard-learned"
                                hx-post="/flashcards/learned"
                                hx-include="#card-word-id"
                                hx-target="#card-section"
                                hx-swap="innerHTML">
                            Learned ✓
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
