<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Flashcards – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <h2>Flashcards</h2>
        <p class="lang-label" th:text="${fromLang + ' → ' + toLang}">ENGLISH → HUNGARIAN</p>

        <div id="card-container">
            <div th:if="${card == null}" class="banner-error">No cards available.</div>
            <div th:if="${card != null}" th:replace="~{fragments/card :: card}"></div>
        </div>

        <div class="flashcard-actions">
            <button type="button"
                    hx-get="/flashcards/card"
                    hx-target="#card-container"
                    hx-swap="innerHTML">
                Next card
            </button>
            <a th:href="@{/}" class="link-home">← Back to Home</a>
        </div>
    </div>
</body>
</html>
