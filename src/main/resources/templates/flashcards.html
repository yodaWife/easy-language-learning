<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Flashcards – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <div class="page-main">
            <div class="page-container">
                <h2 class="section-title">📇 Flashcards</h2>
                <p class="lang-direction" th:text="${fromLang} + ' → ' + ${toLang}">ENGLISH → HUNGARIAN</p>

                <div id="card-section">
                    <div th:if="${card == null}" class="banner-error">No cards available.</div>
                    <div th:if="${card != null}" th:replace="~{fragments/card :: card}"></div>
                </div>

                <div class="flashcard-actions">
                    <button type="button"
                            class="btn-primary-action"
                            hx-get="/flashcards/card"
                            hx-target="#card-section"
                            hx-swap="innerHTML">
                        Next Card →
                    </button>
                    <a th:href="@{/}" class="back-home-link">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
