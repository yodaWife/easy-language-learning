<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Match Game – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <h2>Match Game</h2>

        </div>
    </div>
</body>
</html>
