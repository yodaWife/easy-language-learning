<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Match Game – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <div class="page-main match-game-page">
            <div class="match-container">
                <h2 class="section-title">🎯 Match Game</h2>

                <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
                <div id="board-container"
                     hx-on::after-request="htmx.process(document.getElementById('board-container'))">
                    <div th:replace="~{fragments/board :: board}"></div>
                </div>

                <div class="match-footer">
                    <p class="match-hint-text d-none d-sm-block">Drag a word or tap to select &amp; match</p>
                    <p class="match-hint-text d-sm-none">Tap a word on each side to match</p>
                    <a th:href="@{/}" class="back-home-link">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
