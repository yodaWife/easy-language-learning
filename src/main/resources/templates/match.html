<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Match Game – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <div class="page-main">
            <div class="match-container">
                <div class="game-card">
                    <h2 class="section-title">🎯 Match Game</h2>
                    <p class="match-hint-text d-none d-sm-block">Drag a word or tap to select &amp; match</p>
                    <p class="match-hint-text d-sm-none">Tap a word on each side to match</p>

                    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
                    <div id="board-container"
                         hx-on::after-request="htmx.process(document.getElementById('board-container'))">
                        <div th:replace="~{fragments/board :: board}"></div>
                    </div>
                </div>
                <script>
                    document.addEventListener('DOMContentLoaded', function () {
                        var card = document.querySelector('.game-card');
                        if (card) {
                            card.style.minHeight = card.offsetHeight + 'px';
                        }
                    });
                </script>
            </div>
        </div>
    </div>
</body>
</html>
