<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Data Health – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <h2>Data Health Status</h2>

        <div th:if="${wordsHealthy and scoresHealthy}" class="banner-success">
            All data loaded successfully.
        </div>

        <div th:if="${!wordsHealthy}" class="banner-error">
            <strong>Word data is in a degraded state. Gameplay is disabled.</strong>
            <ul>
                <li th:each="err : ${wordErrors}" th:text="${err}"></li>
            </ul>
        </div>

        <div th:if="${!scoresHealthy}" class="banner-warning">
            <strong>Score data is in a degraded state. Score persistence is unavailable.</strong>
            <ul>
                <li th:each="err : ${scoreErrors}" th:text="${err}"></li>
            </ul>
        </div>

        <p><a th:href="@{/}">← Back to Home</a></p>
    </div>
</body>
</html>
