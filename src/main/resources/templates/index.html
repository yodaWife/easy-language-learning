<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Home – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <!-- Data health banner -->
        <div id="health-banner-wrapper">
            <div th:replace="~{fragments/health-banner :: healthBanner}"></div>
        </div>

        <div class="page-main">
            <div class="page-container">
                <form th:action="@{/session/start}" method="post">
                    <div class="welcome-card">
                        <div class="home-icons-row">
                            <a th:href="@{/dictionary}" class="home-icon-btn" aria-label="Dictionary Management">
                                <i class="bi bi-book"></i>
                            </a>
                            <button type="button"
                                    class="home-icon-btn"
                                    id="account-icon-btn"
                                    aria-label="User account"
                                    hx-get="/account/panel"
                                    hx-target="#account-modal-content"
                                    hx-swap="innerHTML"
                                    hx-trigger="click"
                                    onclick="document.getElementById('account-modal').classList.add('is-open')">
                                <i class="bi bi-person-circle"></i>
                            </button>
                        </div>
                        <h1 class="welcome-title">Welcome!</h1>
                        <p class="welcome-subtitle">Start your language journey today</p>

                        <div th:replace="~{fragments/account-status :: status}"></div>

                        <div class="language-group" th:if="${languages != null and !#lists.isEmpty(languages)}">
                            <label for="languageCode">Language</label>
                            <select id="languageCode" name="languageCode" class="language-select">
                                <option th:each="lang : ${languages}" th:value="${lang}" th:text="${lang}"
                                        th:selected="${lang == primaryLanguage}"></option>
                            </select>
                        </div>

                        <div>
                            <span id="mode-label" class="mode-label-text">Choose your game</span>
                            <div class="mode-cards" role="group" aria-labelledby="mode-label">
                                <button type="submit" name="mode" value="flashcards"
                                        class="mode-card flashcard-card"
                                        th:disabled="${!wordsHealthy}">
                                    <span class="mode-icon">📇</span>
                                    <span class="mode-name">Flashcards</span>
                                </button>
                                <button type="submit" name="mode" value="match"
                                        class="mode-card match-card"
                                        th:disabled="${!wordsHealthy}">
                                    <span class="mode-icon">🎯</span>
                                    <span class="mode-name">Match Game</span>
                                </button>
                            </div>
                        </div>


                        <p class="footer-note">Learn at your own pace 🌱</p>
                    </div>
                </form>

                <!-- Account Modal -->
                <div id="account-modal" class="account-modal-overlay">
                    <div class="account-modal-dialog">
                        <button type="button"
                                class="account-modal-close"
                                aria-label="Close"
                                onclick="document.getElementById('account-modal').classList.remove('is-open')">
                            <i class="bi bi-x-lg"></i>
                        </button>
                        <div id="account-modal-content">
                            <!-- Loaded via HTMX when account icon is clicked -->
                        </div>
                    </div>
                </div>

                <script>
                (function() {
                    document.getElementById('account-modal').addEventListener('click', function(e) {
                        if (e.target === this) this.classList.remove('is-open');
                    });
                })();
                </script>
            </div>
        </div>


    </div>
</body>
</html>
