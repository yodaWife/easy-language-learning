<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Home – Easy Language Learning</title>
</head>
<body>
    <div id="content">
        <!-- Data health banner -->
        <div id="health-banner-wrapper">
            <div th:replace="~{fragments/health-banner :: healthBanner}"></div>
        </div>

        <div class="page-main">
            <div class="page-container">
                <form th:action="@{/session/start}" method="post">
                    <div class="welcome-card">
                        <h1 class="welcome-title">Welcome!</h1>
                        <p class="welcome-subtitle">Start your language journey today</p>

                        <div class="nickname-group">
                            <label for="nickname">Nickname</label>
                            <span class="nickname-hint">(optional — enables score tracking)</span>
                            <input type="text"
                                   id="nickname"
                                   name="nickname"
                                   class="nickname-input"
                                   placeholder="Leave blank to play anonymously"
                                   th:list="${nicknames != null ? 'nickname-suggestions' : ''}"
                                   autocomplete="off">
                            <datalist id="nickname-suggestions">
                                <option th:each="n : ${nicknames}" th:value="${n}"></option>
                            </datalist>
                        </div>

                        <div>
                            <span id="mode-label" class="mode-label-text">Choose your mode</span>
                            <div class="mode-cards" role="radiogroup" aria-labelledby="mode-label">
                                <div class="mode-card flashcard-card selected"
                                     role="radio"
                                     aria-checked="true"
                                     tabindex="0"
                                     data-value="flashcards">
                                    <span class="mode-icon">📇</span>
                                    <span class="mode-name">Flashcards</span>
                                </div>
                                <div class="mode-card match-card"
                                     role="radio"
                                     aria-checked="false"
                                     tabindex="-1"
                                     data-value="match">
                                    <span class="mode-icon">🎯</span>
                                    <span class="mode-name">Match Game</span>
                                </div>
                            </div>
                            <input type="hidden" name="mode" id="mode-input" value="flashcards">
                        </div>

                        <button type="submit" class="btn-start" th:disabled="${!healthy}">
                            Start Learning →
                        </button>

                        <p class="footer-note">Learn at your own pace 🌱</p>
                    </div>
                </form>
            </div>
        </div>

        <script>
        (function() {
            var cards = document.querySelectorAll('.mode-card');
            var modeInput = document.getElementById('mode-input');

            function selectCard(card) {
                cards.forEach(function(c) {
                    c.classList.remove('selected');
                    c.setAttribute('aria-checked', 'false');
                    c.setAttribute('tabindex', '-1');
                });
                card.classList.add('selected');
                card.setAttribute('aria-checked', 'true');
                card.setAttribute('tabindex', '0');
                modeInput.value = card.getAttribute('data-value');
            }

            cards.forEach(function(card) {
                card.addEventListener('click', function() {
                    selectCard(card);
                });
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectCard(card);
                    }
                    // Roving tabindex arrow keys
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        var idx = Array.from(cards).indexOf(card);
                        var next = cards[(idx + 1) % cards.length];
                        next.focus();
                        selectCard(next);
                    }
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        var idx = Array.from(cards).indexOf(card);
                        var prev = cards[(idx - 1 + cards.length) % cards.length];
                        prev.focus();
                        selectCard(prev);
                    }
                });
            });
        })();
        </script>
    </div>
</body>
</html>
