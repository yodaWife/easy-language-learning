# PostgreSQL datasource — override with environment variables in production
spring.datasource.url=jdbc:postgresql://localhost:5432/easyll
spring.datasource.username=easyll
spring.datasource.password=easyll
spring.datasource.driver-class-name=org.postgresql.Driver

# Re-enable DataSource autoconfiguration in db profile
spring.autoconfigure.exclude=

# Flyway enabled in db profile
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
